<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SentimentIQ</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
</head>
<body>
  <div class="auth-page">
    <div class="glass auth-card animate-in">
      <div class="auth-logo">
        <h1>🧠 Sentiment<span>IQ</span></h1>
        <p>Internet Mood Intelligence Platform</p>
      </div>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username" class="form-label">Username or Email</label>
          <input type="text" id="username" class="form-control" placeholder="Enter your username or email" required>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
          <span>Sign In</span>
          <div class="spinner spinner-sm hidden" id="btnSpinner"></div>
        </button>
      </form>
      <div class="auth-divider">
        <p>Don't have an account? <a href="/register">Create one here</a></p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect to dashboard
      if (localStorage.getItem('access_token')) {
        window.location.href = '/dashboard';
      }
      initLogin();
    });
  </script>
</body>
</html>
